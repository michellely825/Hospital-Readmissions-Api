# configures the server + db connection

spring.application.name=hospital-api
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital
spring.datasource.username=michellely
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool ──────────────────────────────────────────────────
# Cap the pool at 10 connections — sufficient for a small API and prevents
# connection exhaustion from leaking connections accumulating over time.
spring.datasource.hikari.maximum-pool-size=10
# How long (ms) a caller waits for a connection before throwing an exception.
spring.datasource.hikari.connection-timeout=30000
# How long (ms) an idle connection is kept before being retired.
spring.datasource.hikari.idle-timeout=600000
# Hard upper bound on a connection's lifetime regardless of activity.
spring.datasource.hikari.max-lifetime=1800000
# Name shown in pool metrics / thread dumps for easier identification.
spring.datasource.hikari.pool-name=HospitalApiPool

# ── Request / upload size limits ─────────────────────────────────────────────
# Reject oversized payloads before they reach the controller layer.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────────────────────────────────────
# Show the MemoryMonitoringFilter output (INFO) and suppress noisy framework
# DEBUG chatter so the memory/pool lines are easy to grep in production logs.
logging.level.com.michellely.hospital_api.MemoryMonitoringFilter=INFO
logging.level.com.michellely.hospital_api=INFO
# Uncomment the line below to see every SQL statement executed by JdbcTemplate.
# logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# Log HikariCP pool lifecycle events (connections opened/closed/timed-out).
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG